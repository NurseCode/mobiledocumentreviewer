name: Build Android APK/AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Verify build.gradle exists
      run: |
        if [ ! -f build.gradle ]; then
          echo "Creating build.gradle with modern syntax"
          cat > build.gradle << 'EOF'
        plugins {
            id 'com.android.application' version '8.7.0' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }

        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        fi
        
    - name: Create proguard-rules.pro
      run: |
        cat > app/proguard-rules.pro << 'EOF'
        -keep public class * extends android.app.Activity
        -keep public class * extends android.app.Application
        -keep public class * extends androidx.compose.runtime.**
        -keepattributes *Annotation*
        -dontwarn org.bouncycastle.jsse.**
        -dontwarn org.conscrypt.*
        -dontwarn org.openjsse.**
        EOF
        
    - name: Create gradle wrapper properties
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
    - name: Create basic launcher icons
      run: |
        # Install ImageMagick to create PNG icons
        sudo apt-get update
        sudo apt-get install -y imagemagick
        
        # Create launcher icons with ImageMagick (red background with "PDF" text)
        convert -size 48x48 xc:"#E53935" -pointsize 20 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:"#E53935" -pointsize 30 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:"#E53935" -pointsize 40 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:"#E53935" -pointsize 60 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:"#E53935" -pointsize 80 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        # Create round launcher icons
        convert -size 48x48 xc:none -fill "#E53935" -draw "circle 24,24 24,0" -pointsize 20 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        convert -size 72x72 xc:none -fill "#E53935" -draw "circle 36,36 36,0" -pointsize 30 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        convert -size 96x96 xc:none -fill "#E53935" -draw "circle 48,48 48,0" -pointsize 40 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        convert -size 144x144 xc:none -fill "#E53935" -draw "circle 72,72 72,0" -pointsize 60 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        convert -size 192x192 xc:none -fill "#E53935" -draw "circle 96,96 96,0" -pointsize 80 -fill white -gravity center -annotate +0+0 "PDF" app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        
    - name: Create themes.xml
      run: |
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.Material3.DynamicColors.DayNight" parent="android:Theme.Material.Light">
            </style>
        </resources>
        EOF
        
    - name: Create strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Quick PDF Composer</string>
        </resources>
        EOF
        
    - name: Download Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.9 || true
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      
    - name: Build Release AAB (Android App Bundle)
      run: ./gradlew bundleRelease --stacktrace
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: app/build/outputs/bundle/release/app-release.aab
        
    - name: Build Summary
      run: |
        echo "## Build Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Debug APK (for testing)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Release APK (for direct installation)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Release AAB (for Google Play Console upload)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### File Sizes:" >> $GITHUB_STEP_SUMMARY
        ls -lh app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | awk '{print "Debug APK: " $5}' >> $GITHUB_STEP_SUMMARY || true
        ls -lh app/build/outputs/apk/release/app-release.apk 2>/dev/null | awk '{print "Release APK: " $5}' >> $GITHUB_STEP_SUMMARY || true
        ls -lh app/build/outputs/bundle/release/app-release.aab 2>/dev/null | awk '{print "Release AAB: " $5}' >> $GITHUB_STEP_SUMMARY || true
